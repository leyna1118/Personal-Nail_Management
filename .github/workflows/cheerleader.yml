name: AICheerleader
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  cheer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leyna1118/Personal-AI_Cheerleader@main
        with:
          ai-api-key: ${{ secrets.GEMINI_API_KEY }}
          style: warm
          language: en
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}